<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Industry Website</title>
    <link rel="stylesheet" href="/bootstrap/css/bootstrap.min.css">
<link rel="stylesheet" href="./node_modules/bootstrap-icons/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="responsive.css">
</head>
<body>
    <div id="navbar"></div>
    <section class="hero-section text-white d-flex align-items-center">
        <div class="container">
            <p class="banner-title">Contact <strong>Us</strong></p>
            <div class="breadcrumb-text">
                <a href="index.html">Home</a>
                <span class="dot"><i class="bi bi-dot"></i></span>
                <span class="active">Contact Us</span>
            </div>
        </div>
    </section>

  <section class="contact-section">
    <div class="container">
        <div class="row align-items-center g-lg-5">
            <div class="col-lg-6">
                  <div class="d-flex gap-2">
        <i class="bi bi-gear textstyle"></i>
<p class="history-sub">CONTACT US</p></div>
<p class="history-title">
Get in touch
<strong>with us</strong>
</p>

<p class="contact-text">
    Reach out for any inquiries, support, or to discuss how we can meet your industrial needs.
</p>
<div class="contact-item">
    <div class="contacticon-box">
        <i class="bi bi-telephone"></i>
    </div>
    <div class="contactdetail">
    <h6>Contact</h6>
    <p>+1 (202) 123-0123</p>
    </div>
</div>

<div class="contact-item">
    <div class="contacticon-box">
        <i class="bi bi-envelope"></i>
    </div>
    <div class="contactdetail">
    <h6>E-mail</h6>
    <p>info@domainname.com</p>
    </div>
</div>

<div class="contact-item">
    <div class="contacticon-box">
        <i class="bi bi-geo-alt"></i>
    </div>
    <div class="contactdetail">
    <h6>Our Address</h6>
    <p>1231 Sam Lane, Coral Piedmont AZ, 85247 CH</p>
    </div>
</div>
            </div>

            <div class="col-lg-6">
                <div class="contact-form-card">
                    <h3 class="form-title">
                        Contact <b>me</b>
                    </h3>

                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" class="form-control" placeholder="Enter first name">
                            </div>
                            <div class="col-md-6">
                                <input type="text" class="form-control" placeholder="Enter last name">
                            </div>
                            <div class="col-12">
                                <input type="email" class="form-control" placeholder="Enter your e-mail">
                            </div>
                            <div class="col-12">
                                <input type="text" class="form-control" placeholder="Enter your phone no">
                            </div>
                            <div class="col-12">
                                <textarea class="form-control" rows="4" placeholder="write message"></textarea>
                            </div>
                            <div class="col-12">
                                <button class="submit-btn">SUBMIT MESSAGE</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
  </section>

  <section class="map-section">
    <iframe 
src="https://www.google.com/maps?q=London%20Eye&output=embed"
allowfullscreen
loading="lazy">
</iframe>
  </section>

  <div id="footer"></div>

  <script src="/script.js"></script>
<script src="/bootstrap/js/bootstrap.bundle.min.js"></script>

<script>
fetch("navbar.html")
.then(response => response.text())
.then(data => {
document.getElementById("navbar").innerHTML = data;
});
</script>

<script>
fetch("footer.html")
.then(response => response.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});
</script>
</body>

</html>
